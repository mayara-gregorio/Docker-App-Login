version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres-auth-projeto
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dados_projeto_usuarios:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: nextjs-auth-app
    restart: on-failure
    ports:
      - "8000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  dados_projeto_usuarios:
